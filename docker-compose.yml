# To run unit tests -> docker compose up tests-unit
# To run integration tests -> docker compose up tests-integration
# To run the application manually -> docker compose up
services:
  tests-unit:
    profiles: [ tests ]
    build:
      target: tests-unit
  tests-integration:
    profiles: [ tests ]
    build:
      target: tests-integration
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  notes:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ALLOWEDHOSTS: "*"
      ASPNETCORE_URLS: "http://notes"
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__Database: "Host=database; Port=5432; Database=notes-db; Username=root; Password=1234"
      ConnectionStrings__Cache: "localhost:6379"
      Serilog__Using__0: "Serilog.Sinks.Console"
      Serilog__WriteTo__0__Name: "Console"
      Serilog__MinimumLevel__Default: "Information"
      Serilog__MinimumLevel__Override__System: "Warning"
      Serilog__MinimumLevel__Override__Microsoft.AspNetCore: "Warning"
      Serilog__Enrich__0: "FromLogContext"
      Serilog__Enrich__1: "WithMachineName"
      Serilog__Enrich__2: "WithProcessId"
      Serilog__Enrich__3: "WithThreadId"
    ports:
      - 8080:80
    depends_on:
      - database
      - cache
  database:
    image: postgres
    environment:
      POSTGRES_DB: "notes-db"
      POSTGRES_USER: "root"
      POSTGRES_PASSWORD: "1234"
    ports:
      - 5432:5432
    volumes:
      - database:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -h database" ]
      timeout: 3s
      interval: 3s
  cache:
    image: redis
    ports:
      - 6379:6279

volumes:
  database: