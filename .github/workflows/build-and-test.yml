name: Build and Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:

  build-builder-image:
    name: Build builder image
    runs-on: ubuntu-latest

    permissions:
      packages: write

    steps:

      - name: Login to docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to ghcr.io registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Build builder image
        uses: docker/build-push-action@v5
        with:
          target: builder
          tags: ghcr.io/felix2000jp/clean-architecture-template:${{ github.run_id }}
          push: true
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  run-unit-tests:
    name: Run unit tests
    needs: [ build-builder-image ]
    runs-on: ubuntu-latest

    permissions:
      packages: read

    steps:

      - name: Login to docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to ghcr.io registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Checkout git repo
        uses: actions/checkout@v4

      - name: Build unit tests
        uses: docker/build-push-action@v5
        with:
          target: tests-unit
          tags: clean-architecture-template-tests-unit
          push: false
          load: true
#          build-contexts: |
#            builder=docker-image://ghcr.io/felix2000jp/clean-architecture-template:${{ github.run_id }}

      - name: Run unit tests
        run: |
          docker compose -f docker-compose.yml -f docker-compose.override.yml up tests-unit --abort-on-container-exit


