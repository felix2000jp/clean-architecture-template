name: Build and Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-image:
    name: Build image
    runs-on: ubuntu-latest
    steps:
      - name: Login to docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Checkout git repo
        uses: actions/checkout@v4

      - name: Docker build testing image
        uses: docker/build-push-action@v5
        with:
          target: build
          push: false
          load: true

      - name: Docker build unit tests
        uses: docker/build-push-action@v5
        with:
          target: tests-unit
          tags: clean-architecture-template-tests-unit
          push: false
          load: true

      - name: Run unit tests
        run: |
          docker compose -f docker-compose.yml -f docker-compose.override.yml up tests-unit --abort-on-container-exit

      - name: Docker build integration tests
        uses: docker/build-push-action@v5
        with:
          target: tests-integration
          tags: clean-architecture-template-tests-integration
          push: false
          load: true

      - name: Run integration tests
        run: |
          docker compose -f docker-compose.yml -f docker-compose.override.yml up tests-integration --abort-on-container-exit

      - name: Docker metadata for final image
        uses: docker/metadata-action@v5
        with:
          images: felix2000jp/clean-architecture-template
        id: docker_meta

      - name: Build final image
        uses: docker/build-push-action@v5
        with:
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: true
          load: false