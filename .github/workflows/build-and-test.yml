name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:

  inspect-code:
    name: Inspect code
    runs-on: ubuntu-latest

    steps:

    - name: Checkout git repo
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v3.0.3
    
    - name: Install ReSharper command line tools
      shell: bash
      run: dotnet tool install JetBrains.ReSharper.GlobalTools --global

    - name: Inspect code with ReSharper
      shell: bash
      run: jb inspectcode clean-architecture-template --format=Sarif --output=results.sarif.json

    - name: Upload SARIF file
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: results.sarif.json
        category: resharper-inspectcode

  build-builder-image:
    name: Build builder image
    needs: [ inspect-code ]
    runs-on: ubuntu-latest

    permissions:
      packages: write

    steps:

      - name: Login to ghcr.io registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Build builder image
        uses: docker/build-push-action@v5
        with:
          target: builder
          tags: ghcr.io/felix2000jp/clean-architecture-template:${{ env.COMMIT_SHA }}
          push: true
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  run-unit-tests:
    name: Run unit tests
    needs: [ build-builder-image ]
    runs-on: ubuntu-latest

    permissions:
      packages: read

    steps:

      - name: Login to ghcr.io registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Checkout git repo
        uses: actions/checkout@v4

      - name: Build unit tests
        uses: docker/build-push-action@v5
        with:
          target: tests-unit
          tags: clean-architecture-template-tests-unit
          push: false
          load: true
          build-contexts: builder=docker-image://ghcr.io/felix2000jp/clean-architecture-template:${{ env.COMMIT_SHA }}

      - name: Run unit tests
        run: |
          docker compose -f docker-compose.yml -f docker-compose.override.yml up tests-unit --abort-on-container-exit
          docker compose down

  run-integration-tests:
    name: Run integration tests
    needs: [ build-builder-image ]
    runs-on: ubuntu-latest

    permissions:
      packages: read
    
    steps:

      - name: Login to ghcr.io registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Checkout git repo
        uses: actions/checkout@v4

      - name: Build integration tests
        uses: docker/build-push-action@v5
        with:
          target: tests-integration
          tags: clean-architecture-template-tests-integration
          push: false
          load: true
          build-contexts: builder=docker-image://ghcr.io/felix2000jp/clean-architecture-template:${{ env.COMMIT_SHA }}

      - name: Run integration tests
        run: |
          docker compose -f docker-compose.yml -f docker-compose.override.yml up tests-integration --abort-on-container-exit
          docker compose down

  build-final-image:
    name: Build final image
    needs: [ run-unit-tests, run-integration-tests ]
    runs-on: ubuntu-latest

    permissions:
      packages: write

    steps:

      - name: Login to docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata for final image
        uses: docker/metadata-action@v5
        with:
          images: felix2000jp/clean-architecture-template
          flavor: latest=false
          tags: type=raw,value=${{ env.COMMIT_SHA }}
        id: docker_meta

      - name: Build final image
        uses: docker/build-push-action@v5
        with:
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          push: true
          load: false

  clean-up-ghcr:
    name: Clean up ghcr
    needs: [ build-final-image ]
    runs-on: ubuntu-latest
    if: ${{ always() }}

    permissions:
      packages: write

    steps:

      # In GHCR I keep the builders images built
      # On Docker Hub I keep the final images built
      - name: Clean up ghcr
        uses: actions/delete-package-versions@v4
        with:
          package-name: clean-architecture-template
          package-type: container
          delete-only-untagged-versions: true
